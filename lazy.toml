[settings]
default = "build"

[variables]
prefix = "/usr/local"
bindir = "{{prefix}}/bin"
libdir = "{{prefix}}/lib/oxigen/stdlib"
nvim_config = ""

[commands]

[commands.check]
desc = "Running a cargo check on all targets"
run = ["cargo check --all-targets"]

[commands.test]
desc = "Run cargo test"
run = ["cargo test --all-targets"]

[commands.fix]
desc = "Runs a clippy fix for a deep fix"
run = ["cargo clippy --fix"]

[commands.build]
desc = "JIT is on by default (see core/Cargo.toml `default = [\"jit\"]`), so `make build`/`make install` produce the JIT-enabled, VM-improved binary."
run = ["cargo build --release -p oxigen"]

[commands.build-with-jit]
desc = "Explicit JIT build — identical to `build` now that JIT is the default; kept for clarity / backward compatibility."
run = ["cargo build --release -p oxigen --features jit"]

[commands.build-no-jit]
desc = "VM-interpreter-only build (no JIT / cranelift). `--jit` has no effect on it."
run = ["cargo build --release -p oxigen --no-default-features"]

[commands.build-lsp]
run = ["cd lsp-go && go build -o ../target/release/oxigen-lsp ."]

[commands.install]
run = [
  "echo \"Installing oxigen to {{bindir}}...\"",
  "install -d {{bindir}}",
  "install -m 755 target/release/oxigen {{bindir}}/oxigen",
  "echo \"Installing stdlib to {{libdir}}...\"",
  "install -d {{libdir}}",
  "install -m 644 stdlib/*.oxi {{libdir}}/",
  "echo \"\"",
  "echo \"Oxigen installed successfully.\"",
  "echo \" Binary: {{bindir}}/oxigen\"",
  "echo \" Stdlib: {{libdir}}/\"",
]
dep = ["build"]

[commands.install-with-jit]
run = [
  "echo \"Installing oxigen with JIT enabled to {{bindir}}...\"",
  "install -d {{bindir}}",
  "install -m 755 target/release/oxigen {{bindir}}/oxigen",
  "echo \"Installing stdlib to {{libdir}}...\"",
  "install -d {{libdir}}",
  "install -m 644 stdlib/*.oxi {{libdir}}/",
  "echo \"\"",
  "echo \"Oxigen with JIT installed successfully.\"",
  "echo \" Binary: {{bindir}}/oxigen\"",
  "echo \" Stdlib: {{libdir}}/\"",
]
dep = ["build-with-jit"]

[commands.install-no-jit]
run = [
  "echo \"Installing oxigen (VM-only, no JIT) to {{bindir}}...\"",
  "install -d {{bindir}}",
  "install -m 755 target/release/oxigen {{bindir}}/oxigen",
  "echo \"Installing stdlib to {{libdir}}...\"",
  "install -d {{libdir}}",
  "install -m 644 stdlib/*.oxi {{libdir}}/",
  "echo \"\"",
  "echo \"Oxigen (VM-only) installed successfully.\"",
  "echo \" Binary: {{bindir}}/oxigen\"",
  "echo \" Stdlib: {{libdir}}/\"",
]
dep = ["build-no-jit"]

[commands.install-lsp]
run = [
  "echo \"Installing oxigen-lsp to {{bindir}}...\"",
  "install -d {{bindir}}",
  "install -m 755 target/release/oxigen-lsp {{bindir}}/oxigen-lsp",
  "echo \"oxigen-lsp installed successfully.\"",
  "echo \" Binary: {{bindir}}/oxigen-lsp\"",
]
dep = ["build-lsp"]

[commands.install-lsp-nvcrow]
desc = "One-shot setup for a Neovim / NvChad (\"nvcrow\") user: installs the oxigen-lsp binary (via install-lsp) AND drops the ftdetect, syntax, and lsp config files into the invoking user's Neovim config. Safe to run with sudo — the editor files go to the REAL user's ~/.config/nvim (via $SUDO_USER) and are chowned back to them, never left root-owned. Override the config dir with NVIM_CONFIG=."
run = ["user=\"$${SUDO_USER:-$$(id -un)}\"; home=\"$$(eval echo ~$$user)\"; cfg=\"{{nvim_config}}\"; [ -z \"$$cfg\" ] && cfg=\"$$home/.config/nvim\"; echo \"Installing Neovim/NvChad editor files for '$$user' to $$cfg...\"; install -d \"$$cfg/ftdetect\" \"$$cfg/syntax\" \"$$cfg/lsp\"; install -m 644 editors/neovim/ftdetect/oxigen.lua \"$$cfg/ftdetect/oxigen.lua\"; install -m 644 editors/neovim/syntax/oxigen.lua \"$$cfg/syntax/oxigen.lua\"; install -m 644 editors/neovim/lsp/oxigen_lsp.lua \"$$cfg/lsp/oxigen_lsp.lua\"; if [ -n \"$$SUDO_USER\" ]; then chown \"$$user\" \"$$cfg/ftdetect\" \"$$cfg/syntax\" \"$$cfg/lsp\" \"$$cfg/ftdetect/oxigen.lua\" \"$$cfg/syntax/oxigen.lua\" \"$$cfg/lsp/oxigen_lsp.lua\" 2>/dev/null || true; fi; echo \"\"; echo \"Oxigen LSP + Neovim files installed.\"; echo \" Binary: {{bindir}}/oxigen-lsp\"; echo \" ftdetect: $$cfg/ftdetect/oxigen.lua\"; echo \" syntax: $$cfg/syntax/oxigen.lua\"; echo \" lsp: $$cfg/lsp/oxigen_lsp.lua\"; echo \"\"; echo \"Enable the server in your NvChad config (lua/configs/lspconfig.lua):\"; echo \" vim.lsp.enable(\\\"oxigen_lsp\\\")\"; echo \"(or add \\\"oxigen_lsp\\\" to your servers list). Then restart Neovim or run\"; echo \":LspRestart and confirm with :LspInfo / :checkhealth lsp.\""]
dep = ["install-lsp"]

[commands.install-all]
dep = ["install", "install-lsp"]

[commands.uninstall]
run = [
  "echo \"Uninstalling oxigen...\"",
  "rm -f {{bindir}}/oxigen",
  "rm -f {{bindir}}/oxigen-lsp",
  "rm -rf {{prefix}}/lib/oxigen",
  "echo \"Oxigen uninstalled.\"",
]

[commands.clean]
run = [
  "cargo clean",
  "rm -f lsp-go/oxigen-lsp",
]

[commands.bench]
desc = "Runs benchmark"
run = ["./scripts/bench.sh"]


